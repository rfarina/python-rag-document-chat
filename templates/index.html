<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Chat and File Upload Interface</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            margin-top: 20px;
        }

        .flex-container {
            display: flex;
            align-items: stretch;
            gap: 30px;
        }

        .chat-container,
        .upload-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background-color: #f9f9f9;
            height: 500px;
            /* Fixed height for consistent window size */
        }

        .chat-display {
            flex: 1;
            overflow-y: auto;
            /* Vertical scroll bar for overflow */
            border: 1px solid #ccc;
            margin-bottom: 10px;
            padding: 10px;
            background-color: #fff;
        }

        .upload-result {
            height: 150px;
            /* Fixed height for upload result */
            overflow-y: auto;
            /* Vertical scroll bar */
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #28a745;
            background-color: #d4edda;
            color: #155724;
            border-radius: 5px;
            display: none;
        }

        .message {
            padding: 8px 12px;
            border-radius: 12px;
            margin: 5px 0;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #007bff;
            color: #fff;
            margin-left: auto;
            text-align: left;
        }

        .bot-message {
            background-color: #f1f1f1;
            color: #333;
            margin-right: auto;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="text-center mb-4">Unified Chat and File Upload Interface</h1>
        <div class="flex-container">
            <!-- Chat Section -->
            <div class="chat-container">
                <div class="chat-header"><strong>How can I help?</strong></div>
                <div id="chatDisplay" class="chat-display"></div>
                <div class="chat-input">
                    <div class="row gx-2">
                        <div class="col-10">
                            <input type="text" id="userInput" placeholder="Send a message..." class="form-control" />
                        </div>
                        <div class="col-2 d-grid">
                            <button id="btnSendPrompt" class="btn btn-primary" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- File Upload Section -->
            <div class="upload-container">
                <h2>Upload Files for Embedding</h2>

                <!-- Upload Result Message with Scroll -->
                <div id="uploadResult" class="upload-result"></div>

                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" id="fileInput" name="file" class="form-control" required>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="uploadFile()">Upload</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Add event listener to trigger button click on Enter key
        document.getElementById('userInput').addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                document.getElementById('btnSendPrompt').click();
            }
        });
    </script>
    
    <script>
        // File Upload via Fetch API
        async function uploadFile() {
            const form = document.getElementById("uploadForm");
            const formData = new FormData(form);
            const resultDiv = document.getElementById("uploadResult");

            try {
                const response = await fetch("/upload", {
                    method: "POST",
                    body: formData
                });

                const result = await response.json();
                resultDiv.textContent = result.message;
                resultDiv.style.display = "block";
            } catch (error) {
                resultDiv.textContent = "Error: Could not connect to server.";
                resultDiv.style.display = "block";
                resultDiv.style.backgroundColor = "#f8d7da";
                resultDiv.style.borderColor = "#f5c6cb";
                resultDiv.style.color = "#721c24";
            }
        }

        // Chat Message Submission
        async function sendMessage() {
            const userInput = document.getElementById("userInput").value;
            const chatDisplay = document.getElementById("chatDisplay");

            if (!userInput.trim()) {
                alert("Please enter a valid message.");
                return;
            }

            // Display user message
            chatDisplay.innerHTML += `<div class="message user-message">${userInput}</div>`;

            try {
                const response = await fetch("/query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userInput })
                });

                const result = await response.json();
                chatDisplay.innerHTML += `<div class="message bot-message">${result.response}</div>`;
            } catch (error) {
                chatDisplay.innerHTML += `<div class="message bot-message" style="color: red;">Error: Could not connect to the server.</div>`;
            }

            document.getElementById("userInput").value = "";
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }
    </script>
</body>

</html>
